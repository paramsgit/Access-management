name: Deploy to AWS ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend Image
        run: |
          docker build -t backend ./backend
          docker tag backend:latest ${{ secrets.ECR_BACKEND_REPOSITORY }}:latest
          docker push ${{ secrets.ECR_BACKEND_REPOSITORY }}:latest

      - name: Build Frontend Image
        run: |
          docker build -t frontend ./frontend
          docker tag frontend:latest ${{ secrets.ECR_FRONTEND_REPOSITORY }}:latest
          docker push ${{ secrets.ECR_FRONTEND_REPOSITORY }}:latest

      - name: Deploy Backend
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_BACKEND_SERVICE }} \
            --force-new-deployment

      - name: Deploy Frontend
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_FRONTEND_SERVICE }} \
            --force-new-deployment
