name: Deploy to AWS ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  BACKEND_ECR: ${{ secrets.ECR_BACKEND_REPOSITORY }}
  FRONTEND_ECR: ${{ secrets.ECR_FRONTEND_REPOSITORY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  BACKEND_SERVICE: ${{ secrets.ECS_BACKEND_SERVICE }}
  FRONTEND_SERVICE: ${{ secrets.ECS_FRONTEND_SERVICE }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # -------- Backend --------

      - name: Build Backend Image
        run: |
          docker build -t backend:$IMAGE_TAG ./backend
          docker tag backend:$IMAGE_TAG $BACKEND_ECR:$IMAGE_TAG
          docker push $BACKEND_ECR:$IMAGE_TAG

      - name: Render Backend Task Definition
        id: backend-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend-task-definition.json
          container-name: backend
          image: ${{ env.BACKEND_ECR }}:${{ env.IMAGE_TAG }}

      - name: Deploy Backend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.backend-task.outputs.task-definition }}
          service: ${{ env.BACKEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # -------- Frontend --------

      - name: Build Frontend Image
        run: |
          docker build -t frontend:$IMAGE_TAG ./frontend
          docker tag frontend:$IMAGE_TAG $FRONTEND_ECR:$IMAGE_TAG
          docker push $FRONTEND_ECR:$IMAGE_TAG

      - name: Render Frontend Task Definition
        id: frontend-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend-task-definition.json
          container-name: frontend
          image: ${{ env.FRONTEND_ECR }}:${{ env.IMAGE_TAG }}

      - name: Deploy Frontend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.frontend-task.outputs.task-definition }}
          service: ${{ env.FRONTEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
