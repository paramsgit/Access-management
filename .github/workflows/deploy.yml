name: Deploy to AWS ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}

jobs:

  backend:
    runs-on: ubuntu-latest

    env:
      SERVICE: ${{ secrets.ECS_BACKEND_SERVICE }}
      ECR_REPO: ${{ secrets.ECR_BACKEND_REPOSITORY }}
      TASK_DEF: backend-task-definition.json
      CONTAINER: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build & Push Backend
        run: |
          docker build -t $ECR_REPO:$IMAGE_TAG ./backend
          docker push $ECR_REPO:$IMAGE_TAG

      - name: Render Task Definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEF }}
          container-name: ${{ env.CONTAINER }}
          image: ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}

      - name: Deploy Backend
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  frontend:
    runs-on: ubuntu-latest

    env:
      SERVICE: ${{ secrets.ECS_FRONTEND_SERVICE }}
      ECR_REPO: ${{ secrets.ECR_FRONTEND_REPOSITORY }}
      TASK_DEF: frontend-task-definition.json
      CONTAINER: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build & Push Frontend
        run: |
          docker build -t $ECR_REPO:$IMAGE_TAG ./frontend
          docker push $ECR_REPO:$IMAGE_TAG

      - name: Render Task Definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEF }}
          container-name: ${{ env.CONTAINER }}
          image: ${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}

      - name: Deploy Frontend
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
